<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://storage.googleapis.com https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; worker-src 'self'; manifest-src 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>WhiteVault — Finance</title>

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme + iOS PWA chrome -->
    <meta name="theme-color" content="#F7F7F7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E0E0F" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WhiteVault" />
    <meta name="application-name" content="WhiteVault" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO / OpenGraph -->
    <meta name="description" content="WhiteVault — Disciplined Premium finance tracking. Multi-context, multi-currency, Profit First." />
    <meta property="og:title" content="WhiteVault — Finance" />
    <meta property="og:description" content="Disciplined Premium finance tracking." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              onyx: '#0E0E0F',
              stone: '#F7F7F7',
              graphite: '#4B4B4D',
              concrete: '#DEDEDE',
              alloy: '#C9A86A',
              gold: '#D4A853',
              primary: '#0E0E0F',
              secondary: '#4B4B4D',
            },
            backgroundImage: {
              'metallic': 'linear-gradient(to right, #B89B63, #E8D3A5, #B89B63)',
            },
            keyframes: {
              'in': { from: { opacity: '0' }, to: { opacity: '1' } },
              'slide-in-from-bottom-2': { from: { transform: 'translateY(8px)' }, to: { transform: 'translateY(0)' } },
              'slide-in-from-bottom-4': { from: { transform: 'translateY(16px)' }, to: { transform: 'translateY(0)' } },
              'slide-in-from-top-2': { from: { transform: 'translateY(-8px)' }, to: { transform: 'translateY(0)' } },
              'fade-in': { from: { opacity: '0' }, to: { opacity: '1' } }
            },
            animation: {
              'in': 'in 200ms ease-out',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
</head>
  <body class="bg-stone text-onyx selection:bg-alloy selection:text-white">
    <div id="root"></div>

    <script>
      // Register service worker (PWA + push)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function (err) {
            console.warn('[wv] SW registration failed', err);
          });
        });
      }
    </script>

    <script type="module" src="/index.tsx"></script>
</body>
</html>
